<section id="skills" class="skills" #skillsSection>
  <div class="container" data-aos="fade-up">

    <div class="row">
      <div class="col-lg-6 d-flex align-items-center" data-aos="fade-right" data-aos-delay="100">
        <img src="assets/img/skills.jpg" class="img-fluid" alt="">
      </div>
      <div class="col-lg-6 pt-4 pt-lg-0 content" data-aos="fade-left" data-aos-delay="100">
        <h3>Voluptatem dignissimos provident quasi corporis voluptates</h3>
        <p class="fst-italic">
          Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore
          magna aliqua.
        </p>
        <div class="skills-content"  *ngFor="let skill of skills; let i = index">
          <div class="progress" >
              <span class="skill">{{ skill.name }}<i class="val">{{ skill.percent }} %</i></span>
            <div class="progress-bar-wrap">
              <div class="progress-bar" role="progressbar" [attr.aria-valuenow]="skill.percent" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          </div>

        </div>
    </div>
  </div>
  </div>
</section>
