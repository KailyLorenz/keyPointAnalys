<section id="why-us" class="why-us section-bg">
  <div class="container-fluid" data-aos="fade-up">

    <div class="row">

      <div class="col-lg-7 d-flex flex-column justify-content-center align-items-stretch  order-2 order-lg-1">

        <div class="content">
          <h3>Eum ipsam laborum deleniti <strong>velit pariatur architecto aut nihil</strong></h3>
          <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Duis aute irure dolor in reprehenderit
          </p>
        </div>

        <div class="accordion-list" id="accordionContain">
          <ul>
            <li *ngFor="let item of thesis; let id = index">
              <a data-bs-toggle="collapse"
                 [id]="'heading' + id"
                 [class]="openAccordion[id] ?  'active' : 'collapsed'"
              >
                <span>{{ '0' + (id + 1)}}</span> {{ item.link }}
                  <i class="bx icon-toggle"
                     [class]="!openAccordion[id] ? 'bx-chevron-down' :  'bx-chevron-up'"
                     data-bs-toggle="collapse"
                     [attr.data-bs-target]="'#collapse' + id"
                     aria-expanded="true"
                     [attr.aria-controls]="'collapse' + id"
                     (click)='toggleIcon(id)'></i>
              </a>
              <div [id]="'accordion-list-' + id"
                   class="accordion-collapse collapse"
                   [attr.aria-labelledby]="'heading' + id"
                   data-bs-parent="#accordionContain"
                  [class.show]='openAccordion[id]'>

                <p>
                  {{ item.text }}
                </p>
              </div>
            </li>
          </ul>
        </div>
      </div>

      <div class="col-lg-5 align-items-stretch order-1 order-lg-2 img" style='background-image: url("../../../assets/img/why-us.jpg");' data-aos="zoom-in" data-aos-delay="150">&nbsp;</div>
    </div>

  </div>
</section>
